<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>あなたらしい未来の見つけ方診断 | WOMAN'sアカデミー</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500&family=Noto+Sans+JP:wght@300;400;500&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --gold:#D4A843; --gold-lt:#F9F3E3; --gold-md:#E8CC85;
    --teal:#3a9a8c; --teal-dk:#2b7a6e; --teal-lt:#e5f0f0; --teal-md:#a8d4cf; --teal-pale:#f0f8f7;
    --text-d:#2a3a38; --text-m:#4a6660; --text-s:#8aa8a3;
    --bg:#f4fafa; --card:#ffffff; --border:rgba(58,154,140,0.18); --border-g:rgba(212,168,67,0.25);
  }
  body { font-family:'Noto Sans JP',sans-serif; background:var(--bg); color:var(--text-d); min-height:100vh; display:flex; flex-direction:column; align-items:center; }
  .header { width:100%; background:var(--card); border-bottom:1px solid var(--border-g); padding:12px 24px; display:flex; align-items:center; justify-content:center; gap:12px; }
  .header-logo-img { width:44px; height:44px; object-fit:contain; }
  .header-text { display:flex; flex-direction:column; gap:2px; }
  .header-name { font-family:'Noto Serif JP',serif; font-weight:400; font-size:15px; letter-spacing:0.12em; color:var(--gold); }
  .header-sub { font-size:11px; letter-spacing:0.1em; color:var(--text-s); }
  .wrap { width:100%; max-width:640px; padding:32px 20px 80px; display:flex; flex-direction:column; align-items:center; }
  .screen { width:100%; display:none; }
  .screen.active { display:flex; flex-direction:column; align-items:center; }
  .hero-img { width:100%; border-radius:16px; margin-bottom:28px; box-shadow:0 4px 24px rgba(58,154,140,0.10); animation:bloom .6s ease-out; }
  .hero-tag { font-size:11px; letter-spacing:0.22em; color:var(--gold); border:1px solid var(--gold-md); border-radius:20px; padding:4px 18px; margin-bottom:20px; }
  .hero-sub { font-size:14px; color:var(--text-m); text-align:center; line-height:2.1; margin-bottom:40px; max-width:420px; }
  .hero-note { font-size:12px; color:var(--text-s); margin-bottom:36px; letter-spacing:0.06em; }
  .progress-wrap { width:100%; margin-bottom:32px; }
  .progress-meta { display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; }
  .progress-label { font-size:11px; letter-spacing:0.16em; color:var(--text-s); }
  .progress-pct { font-size:11px; color:var(--teal); font-weight:500; }
  .progress-bar { height:3px; background:var(--teal-lt); border-radius:3px; overflow:hidden; }
  .progress-fill { height:100%; background:linear-gradient(to right,var(--teal-md),var(--teal)); border-radius:3px; transition:width .4s ease; }
  .q-card { background:var(--card); border:1px solid var(--border); border-radius:20px; padding:36px 28px 28px; width:100%; margin-bottom:20px; }
  .q-num { font-size:11px; letter-spacing:0.22em; color:var(--teal); margin-bottom:16px; }
  .q-text { font-family:'Noto Serif JP',serif; font-size:clamp(16px,4vw,19px); line-height:1.85; color:var(--text-d); margin-bottom:28px; white-space:pre-line; }
  .q-options { display:flex; flex-direction:column; gap:10px; }
  .q-option { background:var(--teal-pale); border:1.5px solid var(--border); border-radius:12px; padding:14px 18px; font-size:14px; line-height:1.7; color:var(--text-m); cursor:pointer; text-align:left; transition:border-color .2s,background .2s,color .2s; display:flex; align-items:flex-start; gap:12px; font-family:'Noto Sans JP',sans-serif; }
  .q-option .opt-mark { flex-shrink:0; width:20px; height:20px; border-radius:50%; border:1.5px solid var(--teal-md); display:flex; align-items:center; justify-content:center; font-size:11px; color:var(--teal); margin-top:2px; transition:background .2s,border-color .2s; }
  .q-option:hover { border-color:var(--teal-md); background:var(--teal-lt); color:var(--text-d); }
  .q-option.selected { border-color:var(--teal); background:var(--teal-lt); color:var(--text-d); }
  .q-option.selected .opt-mark { background:var(--teal); border-color:var(--teal); color:#fff; }
  .nav { display:flex; gap:12px; width:100%; }
  .btn { flex:1; padding:14px; border-radius:12px; font-size:14px; font-family:'Noto Sans JP',sans-serif; cursor:pointer; transition:opacity .2s,transform .1s; border:none; letter-spacing:0.06em; }
  .btn:active { transform:scale(0.98); }
  .btn-back { background:var(--card); color:var(--text-s); border:1px solid var(--border); flex:0 0 80px; }
  .btn-next { background:var(--teal); color:#fff; font-weight:500; }
  .btn-next:disabled { background:var(--teal-md); opacity:.55; cursor:default; }
  .btn-primary { background:var(--teal); color:#fff; font-weight:500; font-size:15px; padding:16px 32px; border-radius:40px; border:none; cursor:pointer; letter-spacing:0.1em; transition:opacity .2s,transform .1s; width:100%; max-width:320px; }
  .btn-primary:hover { opacity:.87; }
  .loading-wrap { display:flex; flex-direction:column; align-items:center; gap:24px; padding:80px 0; }
  .logo-spin { animation:spin 2.4s linear infinite; width:72px; height:72px; object-fit:contain; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .loading-text { font-family:'Noto Serif JP',serif; font-size:15px; color:var(--text-m); letter-spacing:0.14em; }
  .result-badge { font-size:11px; letter-spacing:0.22em; color:var(--gold); border:1px solid var(--gold-md); border-radius:20px; padding:4px 18px; margin-bottom:22px; }
  .result-logo-wrap { width:100px; height:100px; background:var(--teal-lt); border-radius:50%; display:flex; align-items:center; justify-content:center; margin-bottom:24px; animation:bloom .55s ease-out; border:1px solid var(--teal-md); }
  @keyframes bloom { from { transform:scale(.5); opacity:0; } to { transform:scale(1); opacity:1; } }
  .result-logo-img { width:76px; height:76px; object-fit:contain; }
  .result-type { font-family:'Noto Serif JP',serif; font-size:clamp(21px,5vw,27px); color:var(--teal-dk); text-align:center; margin-bottom:8px; letter-spacing:0.05em; }
  .result-catch { font-size:13px; color:var(--text-s); letter-spacing:0.1em; margin-bottom:36px; text-align:center; }
  .result-card { background:var(--card); border:1px solid var(--border); border-radius:20px; padding:28px 24px; width:100%; margin-bottom:20px; }
  .result-desc { font-size:15px; line-height:2.1; color:var(--text-m); margin-bottom:22px; }
  .result-points { display:flex; flex-direction:column; gap:12px; }
  .result-point { display:flex; align-items:flex-start; gap:10px; font-size:14px; line-height:1.75; color:var(--text-m); }
  .point-dot { flex-shrink:0; width:7px; height:7px; border-radius:50%; background:var(--teal-md); margin-top:8px; }
  .cta-block { background:var(--gold-lt); border:1px solid var(--gold-md); border-radius:20px; padding:32px 24px; width:100%; margin-bottom:28px; text-align:center; }
  .cta-logo { width:56px; height:56px; object-fit:contain; margin-bottom:16px; }
  .cta-eyebrow { font-size:12px; letter-spacing:0.16em; color:var(--gold); margin-bottom:14px; }
  .cta-title { font-family:'Noto Serif JP',serif; font-size:18px; line-height:1.85; color:var(--text-d); margin-bottom:14px; }
  .cta-body { font-size:14px; line-height:2; color:var(--text-m); margin-bottom:28px; }
  .btn-cta { display:inline-block; background:var(--gold); color:#fff; font-family:'Noto Sans JP',sans-serif; font-weight:500; font-size:14px; letter-spacing:0.1em; padding:15px 40px; border-radius:40px; text-decoration:none; transition:opacity .2s; border:none; cursor:pointer; width:100%; max-width:300px; }
  .btn-cta:hover { opacity:.85; }
  .btn-cta-note { font-size:11px; color:var(--text-s); margin-top:10px; }
  .retry-btn { font-size:13px; color:var(--text-s); text-decoration:underline; cursor:pointer; background:none; border:none; font-family:'Noto Sans JP',sans-serif; margin-top:4px; }
  .seminar-block { background:var(--teal-pale); border:1px solid var(--teal-md); border-radius:20px; padding:32px 24px; width:100%; margin-bottom:28px; text-align:left; }
  .seminar-checks { display:flex; flex-direction:column; gap:10px; margin-bottom:20px; }
  .seminar-check { display:flex; align-items:flex-start; gap:10px; font-size:14px; line-height:1.7; color:var(--text-m); }
  .seminar-check-mark { flex-shrink:0; color:var(--teal); font-weight:600; margin-top:1px; }
  .seminar-lead { font-size:14px; line-height:2; color:var(--text-m); margin-bottom:20px; text-align:center; }
  .seminar-title-box { background:var(--card); border:1px solid var(--teal-md); border-radius:12px; padding:18px 16px; margin-bottom:20px; text-align:center; }
  .seminar-eyebrow { font-size:11px; letter-spacing:0.12em; color:var(--teal); margin-bottom:8px; }
  .seminar-title { font-family:'Noto Serif JP',serif; font-size:16px; line-height:1.7; color:var(--text-d); }
  .seminar-hint { font-size:14px; line-height:2; color:var(--text-m); margin-bottom:24px; text-align:center; }
  .btn-seminar { display:inline-block; background:var(--teal); color:#fff; font-family:'Noto Sans JP',sans-serif; font-weight:500; font-size:14px; letter-spacing:0.1em; padding:15px 40px; border-radius:40px; text-decoration:none; transition:opacity .2s; border:none; cursor:pointer; width:100%; max-width:300px; text-align:center; }
  .btn-seminar:hover { opacity:.85; }
  .seminar-cta-wrap { text-align:center; }
  .footer { width:100%; border-top:1px solid var(--border-g); padding:20px; text-align:center; font-size:11px; color:var(--text-s); letter-spacing:0.08em; background:var(--card); }
  .fade-in { animation:fadein .32s ease; }
  @keyframes fadein { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:none; } }
  @media (max-width:480px) { .q-card { padding:24px 18px 20px; } .cta-block { padding:24px 18px; } .wrap { padding:32px 16px 60px; } }
</style>
</head>

  { tag:"TYPE 04", type:"自分らしさ再発見タイプ", catch:"まず、自分の気持ちを大切にすることからはじめましょう。", desc:"しばらく自分を後回しにしてきたぶん、今は内側に目を向ける時期です。\n「正しい答え」より「自分が心地よいか」を基準に。焦らなくていい。あなたらしさを、ゆっくり取り戻していきましょう。", points:["小さなことでも、自分の好き・嫌いを言葉にしてみましょう。","誰かに話を聴いてもらうだけで、気持ちが整理されることがある","安心できる場所に身を置くことが、最初の一歩になります。"], cta_body:"今のあなたには、安心して自分の話ができる場所が必要かもしれません。まずは気軽なご相談から、一緒に「自分らしさ」を見つけていきましょう。" },
  { tag:"TYPE 02", type:"仲間の輪タイプ", catch:"つながりが、あなたの力になります。", desc:"一人で頑張るより、安心して話せる仲間とのつながりが力になる時期です。\nあなたはすでに動き出す意志を持っています。それを支えてくれる「仲間」がそばにいると、世界が変わります。", points:["同じ想いを持つ人と話すだけで、孤独感が和らぎます。","コミュニティは答えを求める場所ではなく、共感の場所です。","一歩踏み出しやすい環境に身を置くことが大切です。"], cta_body:"今のあなたには、気軽につながれるコミュニティや仲間の場が合っているかもしれません。WOMAN'sアカデミーで、あなたの「仲間」に出会いませんか？" },
  { tag:"TYPE 03", type:"一歩チャレンジタイプ", catch:"考える準備は、できています。", desc:"やりたいこと、目指したい自分、そのイメージはすでにあなたの中にある。\n小さな行動が未来を動かすタイミングです。完璧じゃなくていい。まず一歩を踏み出してみましょう。", points:["「小さく始める」が鍵です。完璧な準備は必要ありません。","行動すると、次の情報や縁が自然と集まってきます。","一人で悩むより、伴走してくれる人を見つけてみましょう。"], cta_body:"今のあなたには、背中を押してくれる具体的なアドバイスやサポートが必要かもしれません。まずは無料相談で、あなたの「次の一歩」を一緒に考えましょう。" },
  { tag:"TYPE 01", type:"学びの種タイプ", catch:"知ることが、未来を広げます。", desc:"新しい知識や視点に触れることで、未来が広がる時期です。\nあなたには今、インプットのエネルギーがある。好奇心のままに動くことで、思いがけない自分に出会えるかもしれません。", points:["「知る」ことが、行動への自信につながります。","視点が広がると、選択肢も自然と増えていきます。","学びは一人でも、仲間と一緒ならさらに深まります。"], cta_body:"今のあなたには、学びと対話が交わるような環境が合っているかもしれません。WOMAN'sアカデミーで、好奇心を一緒に育てていきましょう。" },
  { tag:"TYPE 05", type:"可能性開花タイプ", catch:"次は、力を外へ広げるときです。", desc:"すでにたくさんの力を持っています。次はそれを外へ広げる段階です。\nあなたはすでに動き出しています。次のステージは、その力を世界に届けることです。", points:["自分の経験や強みを「発信」に変えるタイミングです。","同じ方向を向く仲間とのつながりが新しい展開を生みます。","一人で完結せず、つながりを広げることが次の鍵です。"], cta_body:"今のあなたには、可能性をさらに広げてくれるつながりや場が必要かもしれません。WOMAN'sアカデミーで、次のステージへ一緒に踏み出しましょう。" }
];
const scoreMap = [[0,3,1,3],[0,1,2,3],[0,3,2,4],[0,1,2,4],[0,1,3,4]];
let current = 0;
const answers = [];
function show(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
function startQuiz() { current = 0; answers.length = 0; renderQ(); show('screen-quiz'); }
function renderQ() {
  const q = questions[current];
  const pct = Math.round((current+1)/questions.length*100);
  document.getElementById('q-num').textContent = 'Q ' + String(current+1).padStart(2,'0');
  document.getElementById('q-text').textContent = q.text;
  document.getElementById('prog-label').textContent = 'QUESTION ' + (current+1) + ' / ' + questions.length;
  document.getElementById('prog-pct').textContent = pct + '%';
  document.getElementById('prog-fill').style.width = pct + '%';
  document.getElementById('btn-back').style.visibility = current === 0 ? 'hidden' : 'visible';
  const btnNext = document.getElementById('btn-next');
  btnNext.textContent = current === questions.length-1 ? '診断する →' : '次へ →';
  btnNext.disabled = answers[current] === undefined;
  const opts = document.getElementById('q-options');
  opts.innerHTML = '';
  q.options.forEach((opt, i) => {
    const b = document.createElement('button');
    b.className = 'q-option' + (answers[current] === i ? ' selected' : '');
    b.innerHTML = '<span class="opt-mark">' + (answers[current] === i ? '✓' : '') + '</span><span>' + opt + '</span>';
    b.onclick = () => selectOpt(i);
    opts.appendChild(b);
  });
  const card = document.getElementById('q-card');
  card.classList.remove('fade-in'); void card.offsetWidth; card.classList.add('fade-in');
}
function selectOpt(i) {
  answers[current] = i;
  document.querySelectorAll('.q-option').forEach((b, idx) => { b.classList.toggle('selected', idx === i); b.querySelector('.opt-mark').textContent = idx === i ? '✓' : ''; });
  document.getElementById('btn-next').disabled = false;
}
function nextQ() {
  if (answers[current] === undefined) return;
  if (current < questions.length-1) { current++; renderQ(); }
  else { show('screen-loading'); setTimeout(showResult, 1800); }
}
function prevQ() { if (current > 0) { current--; renderQ(); } }
function calcResult() {
  const scores = [0,0,0,0,0];
  answers.forEach((ans, qi) => { scores[scoreMap[qi][ans]]++; });
  return results[scores.indexOf(Math.max(...scores))];
}

    '<a class="btn-cta" href="https://womansacademy.hp.peraichi.com/community" target="_blank" rel="noopener noreferrer">無料説明会に参加してみる</a>' +
    '<p class="btn-cta-note">※ 申し込み後、担当者よりご連絡いたします</p></div>' +
    '<div class="seminar-block">' +
    '<div class="seminar-checks">' +
    '<div class="seminar-check"><span class="seminar-check-mark">✔</span><span>最近なんとなくモヤモヤする</span></div>' +
    '<div class="seminar-check"><span class="seminar-check-mark">✔</span><span>自分らしい生き方を考えたい</span></div>' +
    '<div class="seminar-check"><span class="seminar-check-mark">✔</span><span>これからの人生をもっと楽しみたい</span></div>' +
    '</div>' +
    '<p class="seminar-lead">そんな気持ちがあるなら、トークセッション</p>' +
    '<div class="seminar-title-box">' +
    '<p class="seminar-eyebrow">TALK SESSION</p>' +
    '<p class="seminar-title">「40代のわたしが、私であるために<br>必要なこと」</p>' +
    '</div>' +
    '<p class="seminar-hint">もぜひ覗いてみてください。<br>きっと&ldquo;あなた自身を見つめ直すヒント&rdquo;が見つかるはずです。</p>' +
    '<div class="seminar-cta-wrap">' +
    '<a class="btn-seminar" href="https://ssl.form-mailer.jp/fms/066d8d69880542" target="_blank" rel="noopener noreferrer">セミナー詳細はこちら</a>' +
    '</div>' +
    '</div>' +

}
